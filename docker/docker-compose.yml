services:
  postgres:
    image: postgres:15-alpine
    container_name: open_erp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: open_erp
    ports:
      - "5439:5432"
    networks:
      - open_erp_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  open_erp_network:
    driver: bridge

volumes:
  postgres_data:
